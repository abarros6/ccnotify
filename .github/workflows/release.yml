name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos-arm64
          - os: macos-13
            target: macos-x86_64
          - os: ubuntu-latest
            target: linux-x86_64
          - os: windows-latest
            target: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux webview deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package (unix)
        if: ${{ !startsWith(matrix.os, 'windows') }}
        run: |
          mkdir dist
          cp target/release/ccnotify target/release/ccnotify-overlay dist/
          tar -czf ccnotify-${{ matrix.target }}.tar.gz -C dist .

      - name: Package (windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist | Out-Null
          Copy-Item target/release/ccnotify.exe, target/release/ccnotify-overlay.exe dist/
          Compress-Archive -Path dist/* -DestinationPath ccnotify-${{ matrix.target }}.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ccnotify-*.tar.gz
            ccnotify-*.zip
