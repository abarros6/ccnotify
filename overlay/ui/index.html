<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root {
    --bg: #1e2127;
    --bg-soft: #282c34;
    --fg: #d7dae0;
    --fg-dim: #8a919e;
    --session: #61afef;      /* replaced with session color at boot */
    --working: #61afef;
    --needs: #e5a54b;
    --idle: #79c07a;
    --red: #e06c75;
    --green: #98c379;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { background: transparent; height: 100%; overflow: hidden; }
  body {
    font: 13px/1.45 -apple-system, "Segoe UI", system-ui, sans-serif;
    color: var(--fg);
    -webkit-user-select: none; user-select: none;
  }

  #root {
    height: 100%;
    display: flex; flex-direction: column;
    background: var(--bg);
    border: 1.5px solid var(--session);
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,.45);
    overflow: hidden;
  }
  body.needs-input #root { border-color: var(--needs); }

  /* ---------- compact pill ---------- */
  #pill { display: flex; align-items: center; gap: 9px; padding: 0 12px; height: 61px; cursor: pointer; }
  #grip {
    width: 14px; align-self: stretch; flex: none; cursor: grab;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-dim); font-size: 11px; letter-spacing: 1px;
  }
  #dot { width: 12px; height: 12px; border-radius: 50%; flex: none; background: var(--session); }
  #pill-text { min-width: 0; flex: 1; }
  #alias { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #status-line { font-size: 11.5px; color: var(--fg-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #status-icon { font-size: 17px; flex: none; transition: opacity .6s; }

  body.working      #status-icon { opacity: .75; }
  body.working      #status-line { color: var(--working); }
  body.needs-input  #status-line { color: var(--needs); font-weight: 600; }
  body.needs-input  #dot { box-shadow: 0 0 0 3px color-mix(in srgb, var(--needs) 45%, transparent); background: var(--needs); }
  body.idle         #status-line { color: var(--idle); }

  #shrink {
    background: none; border: none; color: var(--fg-dim); cursor: pointer;
    font-size: 15px; padding: 2px 5px; border-radius: 6px; flex: none;
  }
  #shrink:hover { color: var(--fg); background: rgba(255,255,255,.08); }

  /* ---------- mini dot mode ---------- */
  #mini { display: none; }
  body.mini #pill, body.mini #panel { display: none; }
  body.mini #root { border-radius: 50%; border-width: 2px; }
  body.mini #mini {
    display: flex; align-items: center; justify-content: center;
    height: 100%; cursor: pointer;
  }
  #mini-dot { width: 13px; height: 13px; border-radius: 50%; background: var(--working); transition: background .3s; }
  body.needs-input #mini-dot { background: var(--needs); box-shadow: 0 0 8px 2px color-mix(in srgb, var(--needs) 60%, transparent); }
  body.idle #mini-dot { background: var(--idle); }

  /* ---------- expanded panel ---------- */
  #panel { display: none; flex-direction: column; height: 100%; }
  body.expanded #pill { display: none; }
  body.expanded #panel { display: flex; }

  #panel-head { display: flex; align-items: center; gap: 8px; padding: 9px 10px 9px 12px; background: var(--bg-soft); flex: none; }
  #panel-head .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--session); flex: none; }
  #panel-title { font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .headbtn { background: none; border: none; color: var(--fg-dim); font-size: 14px; cursor: pointer; padding: 2px 6px; border-radius: 6px; }
  .headbtn:hover { color: var(--fg); background: rgba(255,255,255,.06); }
  .headbtn.active { color: var(--fg); background: rgba(255,255,255,.1); }
  .headbtn.err { color: #fff; background: var(--red); }
  #quit.armed { color: #fff; background: var(--red); }
  #panel-head { cursor: grab; }
  #panel-head:active { cursor: grabbing; }

  #content { flex: 1; overflow-y: auto; padding: 12px; -webkit-user-select: text; user-select: text; }
  #content h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--fg-dim); margin-bottom: 8px; }
  #content .filepath { font-family: ui-monospace, Menlo, monospace; font-size: 12px; color: var(--fg); word-break: break-all; margin-bottom: 8px; }
  #content .desc { color: var(--fg-dim); margin-bottom: 8px; }

  pre.code, pre.diff, pre.term {
    font-family: ui-monospace, Menlo, monospace; font-size: 12px;
    background: #14161a; border-radius: 8px; padding: 10px;
    white-space: pre-wrap; word-break: break-all; margin-bottom: 10px;
  }
  pre.term { font-size: 11px; margin-bottom: 0; min-height: 100%; }
  pre.diff { padding: 6px 0; }
  .diff .line { padding: 0 10px; display: block; }
  .diff .del { background: rgba(224,108,117,.16); color: #e8a0a7; }
  .diff .add { background: rgba(152,195,121,.16); color: #b5d99c; }
  .diff .ctx { color: var(--fg-dim); }

  .message-text { white-space: pre-wrap; word-break: break-word; margin-bottom: 10px; }

  #actions { flex: none; padding: 10px 12px; background: var(--bg-soft); }
  #actions:empty { display: none; }
  .btn-row { display: flex; gap: 8px; }
  button.action {
    flex: 1; border: none; border-radius: 8px; padding: 9px 0;
    font-size: 13px; font-weight: 600; cursor: pointer; color: #fff;
  }
  button.allow { background: #3f8a45; }
  button.allow:hover { background: #4a9f51; }
  button.deny { background: #a1424a; }
  button.deny:hover { background: #b84d56; }
  input#deny-reason, textarea#reply-text {
    width: 100%; background: #14161a; color: var(--fg);
    border: 1px solid #3a3f4b; border-radius: 8px; padding: 8px;
    font: inherit; margin-bottom: 8px; resize: none;
    -webkit-user-select: text; user-select: text;
  }
  textarea#reply-text { height: 64px; }
  button.send { background: #3a6ea8; width: 100%; }
  button.send:hover { background: #4380c2; }
  .hint { font-size: 11px; color: var(--fg-dim); margin-top: 6px; text-align: center; }
</style>
</head>
<body class="working">
  <div id="root">
    <div id="pill" title="Click to expand — drag anywhere to move">
      <div id="grip">⋮</div>
      <div id="dot"></div>
      <div id="pill-text">
        <div id="alias">…</div>
        <div id="status-line">connecting…</div>
      </div>
      <div id="status-icon">●</div>
      <button id="shrink" title="Shrink to a dot">–</button>
    </div>

    <div id="mini" title="…">
      <div id="mini-dot"></div>
    </div>

    <div id="panel">
      <div id="panel-head" title="Drag to move">
        <div class="dot"></div>
        <div id="panel-title">…</div>
        <button id="open-host" class="headbtn" title="Open the app running this session">↗</button>
        <button id="output-toggle" class="headbtn" title="Show terminal output">▤</button>
        <button id="collapse" class="headbtn" title="Collapse">▾</button>
        <button id="quit" class="headbtn" title="Quit this Claude session">✕</button>
      </div>
      <div id="content"></div>
      <div id="actions"></div>
    </div>
  </div>

<script>
const invoke = window.__TAURI__.core.invoke;
const appWindow = window.__TAURI__.window.getCurrentWindow();
const LogicalSize = window.__TAURI__.dpi.LogicalSize;

const COMPACT = [250, 64], EXPANDED = [390, 520], MINI = [36, 36];
// Poll failures are near-instant (connection refused) once the wrapper
// dies, so require sustained failure before self-closing.
const DEAD_WRAPPER_FAILS = 6;

let cfg = null;
let state = null;
let expanded = false;
let view = "main";           // "main" | "output"
let outputTimer = null;
let quitArmed = false, quitArmTimer = null;
let panelKey = "";           // skip identical panel rebuilds
let replyDraft = "", denyDraft = "";  // survive rebuilds while typing

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g,
  (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const STATUS_META = {
  working:     { icon: "●", label: "working…" },
  needs_input: { icon: "✋", label: "needs your input" },
  idle:        { icon: "✓", label: "idle — turn finished" },
};

async function boot() {
  cfg = await invoke("get_config");
  document.documentElement.style.setProperty("--session", cfg.color);
  $("alias").textContent = cfg.alias;
  $("panel-title").textContent = cfg.alias;
  document.title = "ccnotify — " + cfg.alias;
  pollLoop();
}

async function pollLoop() {
  let version = 0;
  let failures = 0;
  for (;;) {
    try {
      const next = await invoke("poll_state", { version });
      failures = 0;
      // The long-poll also returns on its 25s timeout with the same
      // version — don't re-render (it would wipe in-progress typing).
      if (next.version === version) continue;
      version = next.version;
      state = next;
      render();
    } catch (e) {
      failures++;
      $("status-line").textContent = "reconnecting…";
      if (failures >= DEAD_WRAPPER_FAILS) {
        // Wrapper is gone for good — don't linger as a zombie overlay.
        await invoke("exit_overlay");
      }
      await new Promise((r) => setTimeout(r, 2000));
    }
  }
}

function render() {
  const meta = STATUS_META[state.status] || STATUS_META.working;
  document.body.classList.toggle("working", state.status === "working");
  document.body.classList.toggle("needs-input", state.status === "needs_input");
  document.body.classList.toggle("idle", state.status === "idle");

  $("status-icon").textContent = meta.icon;
  $("status-line").textContent = state.pending
    ? `permission: ${state.pending.tool_name}`
    : meta.label;
  $("mini").title = `${cfg?.alias ?? ""} — ${
    state.pending ? `permission: ${state.pending.tool_name}` : meta.label
  }`;

  // A new permission request takes priority over the output view.
  if (expanded && state.pending && view === "output") setView("main");
  if (expanded) renderPanel();
}

/* ---------- moving the window ----------
   Native drag regions start dragging on mousedown, which swallows
   clicks — so we arm on mousedown and only start the OS drag once the
   pointer actually moves. A press-and-release without movement is a
   click. Interactive elements are excluded. */

function makeDraggable(el, onClick) {
  el.addEventListener("mousedown", (e) => {
    if (e.button !== 0) return;
    if (e.target.closest("button, input, textarea, a")) return;
    const sx = e.screenX, sy = e.screenY;
    let done = false;
    const cleanup = () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
    };
    const move = (m) => {
      if (done) return;
      if (Math.hypot(m.screenX - sx, m.screenY - sy) > 4) {
        done = true;
        cleanup();
        appWindow.startDragging();
      }
    };
    const up = () => {
      cleanup();
      if (!done && onClick) onClick();
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  });
}

makeDraggable($("pill"), expand);      // whole pill: drag to move, click to expand
makeDraggable($("panel-head"), null);  // expanded: top bar only
makeDraggable($("mini"), () => {
  // From the dot, jump straight to the decision if one is waiting.
  if (state?.status === "needs_input") expand();
  else restorePill();
});

/* ---------- expand / collapse / shrink ---------- */

$("collapse").addEventListener("click", collapse);
$("shrink").addEventListener("click", shrinkToDot);

async function shrinkToDot() {
  expanded = false;
  document.body.classList.add("mini");
  await appWindow.setSize(new LogicalSize(...MINI));
}

async function restorePill() {
  document.body.classList.remove("mini");
  await appWindow.setSize(new LogicalSize(...COMPACT));
}
$("output-toggle").addEventListener("click", () =>
  setView(view === "output" ? "main" : "output"));

async function expand() {
  expanded = true;
  document.body.classList.remove("mini");
  await appWindow.setSize(new LogicalSize(...EXPANDED));
  document.body.classList.add("expanded");
  renderPanel(true);
  await appWindow.setFocus();
}

async function collapse() {
  expanded = false;
  setView("main");
  document.body.classList.remove("expanded");
  await appWindow.setSize(new LogicalSize(...COMPACT));
}

function setView(v) {
  view = v;
  $("output-toggle").classList.toggle("active", v === "output");
  stopOutputPolling();
  if (v === "output") startOutputPolling();
  renderPanel(true);
}

/* ---------- open host app ---------- */

$("open-host").addEventListener("click", async () => {
  try {
    await invoke("open_host");
  } catch (e) {
    const btn = $("open-host");
    btn.classList.add("err");
    btn.title = String(e);
    setTimeout(() => {
      btn.classList.remove("err");
      btn.title = "Open the app running this session";
    }, 2000);
  }
});

/* ---------- quit ---------- */

$("quit").addEventListener("click", async () => {
  if (!quitArmed) {
    quitArmed = true;
    $("quit").classList.add("armed");
    $("quit").title = "Click again to quit the Claude session";
    quitArmTimer = setTimeout(() => {
      quitArmed = false;
      $("quit").classList.remove("armed");
      $("quit").title = "Quit this Claude session";
    }, 3000);
    return;
  }
  clearTimeout(quitArmTimer);
  try { await invoke("quit_session"); } catch (e) { /* wrapper already gone */ }
  // The wrapper closes us when the session ends; if it can't, close anyway.
  setTimeout(() => invoke("exit_overlay"), 3000);
});

/* ---------- expanded content ---------- */

function renderPanel(force = false) {
  if (view === "output") {
    renderOutputView();
    return;
  }
  // Rebuilding wipes any half-typed input, so only rebuild when what
  // we'd show actually changed.
  const key = JSON.stringify([
    state?.pending?.id, state?.can_reply, state?.status, state?.message,
  ]);
  if (!force && key === panelKey) return;
  panelKey = key;

  const content = $("content"), actions = $("actions");
  if (state?.pending) {
    content.innerHTML = formatTool(state.pending.tool_name, state.pending.tool_input);
    actions.innerHTML = `
      <input id="deny-reason" placeholder="Reason if denying (optional)" />
      <div class="btn-row">
        <button class="action deny">Deny</button>
        <button class="action allow">Allow</button>
      </div>`;
    const reason = actions.querySelector("#deny-reason");
    reason.value = denyDraft;
    reason.addEventListener("input", () => { denyDraft = reason.value; });
    actions.querySelector(".allow").onclick = () => sendDecision("allow");
    actions.querySelector(".deny").onclick = () => sendDecision("deny");
  } else if (state?.can_reply) {
    content.innerHTML = `
      <h3>${state.status === "idle" ? "Turn finished" : "Claude is waiting"}</h3>
      <div class="message-text">${esc(state.message || "Claude is waiting for your next prompt.")}</div>`;
    actions.innerHTML = `
      <textarea id="reply-text" placeholder="Reply to Claude…"></textarea>
      <button class="action send">Send</button>
      <div class="hint">⌘↩ / Ctrl↩ to send</div>`;
    const box = actions.querySelector("#reply-text");
    box.value = replyDraft;
    box.addEventListener("input", () => { replyDraft = box.value; });
    const send = async () => {
      const text = box.value.trim();
      if (!text) return;
      await invoke("send_reply", { text });
      replyDraft = "";
      collapse();
    };
    actions.querySelector(".send").onclick = send;
    box.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) send();
    });
    box.focus();
  } else {
    content.innerHTML = `<div class="message-text" style="color:var(--fg-dim)">Claude is working — nothing to decide right now.</div>`;
    actions.innerHTML = "";
  }
}

/* ---------- terminal output view ---------- */

function renderOutputView() {
  $("actions").innerHTML = "";
  if (!$("term-output")) {
    $("content").innerHTML = `<pre class="term" id="term-output">loading…</pre>`;
  }
  refreshOutput();
}

async function refreshOutput() {
  try {
    const text = await invoke("get_output");
    const el = $("term-output");
    if (!el) return;
    const pinned = // keep following the tail unless the user scrolled up
      $("content").scrollTop + $("content").clientHeight >= $("content").scrollHeight - 30;
    el.textContent = text || "(no output yet)";
    if (pinned) $("content").scrollTop = $("content").scrollHeight;
  } catch (e) { /* wrapper briefly busy; next tick will retry */ }
}

function startOutputPolling() {
  refreshOutput();
  outputTimer = setInterval(refreshOutput, 2000);
}

function stopOutputPolling() {
  if (outputTimer) clearInterval(outputTimer);
  outputTimer = null;
}

async function sendDecision(decision) {
  const reason = $("deny-reason")?.value.trim() || null;
  await invoke("decide", {
    id: state.pending.id,
    decision,
    reason: decision === "deny" ? reason : null,
  });
  denyDraft = "";
  collapse();
}

/* ---------- per-tool formatters ---------- */

function formatTool(tool, input) {
  switch (tool) {
    case "Bash":
      return `<h3>Run command</h3>` +
        (input.description ? `<div class="desc">${esc(input.description)}</div>` : "") +
        `<pre class="code">${esc(input.command)}</pre>`;
    case "Edit":
      return `<h3>Edit file</h3>
        <div class="filepath">${esc(input.file_path)}</div>` +
        diffHtml(input.old_string || "", input.new_string || "");
    case "MultiEdit": {
      const edits = (input.edits || [])
        .map((e, i) => `<h3>Edit ${i + 1}</h3>` + diffHtml(e.old_string || "", e.new_string || ""))
        .join("");
      return `<h3>Edit file (${(input.edits || []).length} changes)</h3>
        <div class="filepath">${esc(input.file_path)}</div>` + edits;
    }
    case "Write": {
      let preview = String(input.content ?? "");
      if (preview.length > 2500) preview = preview.slice(0, 2500) + "\n… (truncated)";
      return `<h3>Write file</h3>
        <div class="filepath">${esc(input.file_path)}</div>
        <pre class="code">${esc(preview)}</pre>`;
    }
    case "WebFetch":
      return `<h3>Fetch URL</h3>
        <pre class="code">${esc(input.url)}</pre>` +
        (input.prompt ? `<div class="desc">${esc(input.prompt)}</div>` : "");
    default: {
      // Generic: surface the most decision-relevant fields first.
      const keys = ["command", "url", "file_path", "path", "query", "pattern", "prompt"];
      const hit = keys.find((k) => typeof input?.[k] === "string");
      const body = hit
        ? `<pre class="code">${esc(input[hit])}</pre>`
        : `<pre class="code">${esc(JSON.stringify(input, null, 2)?.slice(0, 2500))}</pre>`;
      return `<h3>${esc(tool)}</h3>` + body;
    }
  }
}

/* Simple unified diff: trim common prefix/suffix lines, show removed
   lines red and added lines green with a little context. */
function diffHtml(oldStr, newStr) {
  const a = oldStr.split("\n"), b = newStr.split("\n");
  let start = 0;
  while (start < a.length && start < b.length && a[start] === b[start]) start++;
  let endA = a.length, endB = b.length;
  while (endA > start && endB > start && a[endA - 1] === b[endB - 1]) { endA--; endB--; }

  const CTX = 2;
  const lines = [];
  for (let i = Math.max(0, start - CTX); i < start; i++)
    lines.push(`<span class="line ctx"> ${esc(a[i])}</span>`);
  for (let i = start; i < endA; i++)
    lines.push(`<span class="line del">-${esc(a[i])}</span>`);
  for (let i = start; i < endB; i++)
    lines.push(`<span class="line add">+${esc(b[i])}</span>`);
  for (let i = endA; i < Math.min(a.length, endA + CTX); i++)
    lines.push(`<span class="line ctx"> ${esc(a[i])}</span>`);
  return `<pre class="diff">${lines.join("\n")}</pre>`;
}

boot();
</script>
</body>
</html>
